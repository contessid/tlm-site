{% unless page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name | escape }}",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "description": "{{ site.description | escape }}",
  "sameAs": [
    "{{ site.author.github | escape }}"
  ]
}
</script>
{% endunless %}
