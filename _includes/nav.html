<nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-container">
        <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="{{ site.title }} - Home">
            {% if site.nav_logo.type == 'image' %}
                <img src="{{ site.nav_logo.image | relative_url }}" alt="{{ site.nav_logo.alt | default: site.title }}" class="nav-logo-image">
            {% elsif site.nav_logo.text %}
                {{ site.nav_logo.text }}
            {% else %}
                {{ site.title | slice: 0, 3 | upcase }}
            {% endif %}
        </a>
        <div class="nav-links">
            <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">Home</a>
            <a href="{{ '/about' | relative_url }}" class="nav-link {% if page.url contains '/about' %}active{% endif %}">About</a>
            <a href="{{ '/people' | relative_url }}" class="nav-link {% if page.url contains '/people' %}active{% endif %}">People</a>
            <a href="{{ '/labs' | relative_url }}" class="nav-link {% if page.url contains '/labs' %}active{% endif %}">Labs</a>
            <a href="{{ '/surveys' | relative_url }}" class="nav-link {% if page.url contains '/surveys' %}active{% endif %}">Surveys</a>
        </div>
    </div>
</nav>
